# .github/workflows/ci-completo.yml
# Workflow de la Clase 2 — Pipeline CI completo

name: CI Pipeline Completo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:

  # ── JOB 1: Lint ────────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── JOB 2: Tests con coverage ──────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 7

  # ── JOB 3: Build ───────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: test

    env:
      APP_VERSION: ${{ vars.APP_VERSION || '1.0.0' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ── JOB 4: Resumen final ────────────────────────────────────────
  summary:
    name: ✅ Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()

    steps:
      - name: Pipeline summary
        run: |
          echo "========================================="
          echo "  PIPELINE SUMMARY"
          echo "========================================="
          echo "  Lint:   ${{ needs.lint.result }}"
          echo "  Test:   ${{ needs.test.result }}"
          echo "  Build:  ${{ needs.build.result }}"
          echo "========================================="
          echo "  Commit: ${{ github.sha }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Actor:  ${{ github.actor }}"
          echo "========================================="
